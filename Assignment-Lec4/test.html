
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { overflow-x: hidden; }
    .sidebar { width: 250px; }
    @media (max-width: 991px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="#">AdminPanel</a>
  <form class="d-flex ms-auto">
    <input class="form-control me-2" type="search" placeholder="Search">
  </form>
  <div class="dropdown ms-3">
    <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">User</button>
    <ul class="dropdown-menu">
      <li><a class="dropdown-item" href="#">Profile</a></li>
      <li><a class="dropdown-item" href="#">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="d-flex">

  <!-- Sidebar -->
  <div class="bg-light sidebar p-3 d-none d-lg-block">
    <h5>Menu</h5>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Users</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Reports</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
    </ul>
  </div>

  <!-- Content -->
  <div class="container-fluid p-4">

    <!-- Tabs -->
    <ul class="nav nav-tabs flex-column flex-lg-row" id="myTab" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboard">Dashboard</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#users">Users</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#reports">Reports</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#settings">Settings</button>
      </li>
    </ul>

    <div class="tab-content mt-3">

      <!-- Dashboard -->
      <div class="tab-pane fade show active" id="dashboard">
        <div class="p-3 shadow rounded">
          <div class="row g-3">

            <!-- Cards -->
            <div class="col-md-3">
              <div class="card text-center p-3">
                <i class="bi bi-people fs-2"></i>
                <h5>Users</h5>
                <span class="badge bg-primary">120</span>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card text-center p-3">
                <i class="bi bi-bar-chart fs-2"></i>
                <h5>Reports</h5>
                <span class="badge bg-success">75</span>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card text-center p-3">
                <i class="bi bi-gear fs-2"></i>
                <h5>Settings</h5>
                <span class="badge bg-warning">5</span>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card text-center p-3">
                <i class="bi bi-bell fs-2"></i>
                <h5>Notifications</h5>
                <span class="badge bg-danger">9</span>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Users -->
      <div class="tab-pane fade" id="users">
        <div class="p-3 shadow rounded">
          <h5>User List</h5>
          <ul class="list-group">
            <li class="list-group-item">User 1</li>
            <li class="list-group-item">User 2</li>
          </ul>

          <button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#userModal">Add User</button>
        </div>
      </div>

      <!-- Reports -->
      <div class="tab-pane fade" id="reports">
        <div class="p-3 shadow rounded">Reports Content</div>
      </div>

      <!-- Settings -->
      <div class="tab-pane fade" id="settings">
        <div class="p-3 shadow rounded">Settings Content</div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="userModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Add User</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="userForm">
          <input type="text" class="form-control mb-2" placeholder="Name" required>
          <input type="email" class="form-control mb-2" placeholder="Email" required>
          <select class="form-control" required>
            <option value="">Select Role</option>
            <option>Admin</option>
            <option>User</option>
          </select>
          <button type="submit" class="btn btn-success mt-3">Save</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast position-fixed bottom-0 end-0 p-3" id="toast">
  <div class="toast-body bg-success text-white">User added successfully!</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const form = document.getElementById('userForm');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const toast = new bootstrap.Toast(document.getElementById('toast'));
    toast.show();
  });
</script>

</body>
</html>
